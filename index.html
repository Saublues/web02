<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/hero-portrait.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <script>
      !(function () {
        var t = localStorage.getItem("theme") || "auto";
        if (
          t === "dark" ||
          (t === "auto" &&
            window.matchMedia("(prefers-color-scheme:dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
          document
            .querySelector('meta[name="theme-color"]')
            .setAttribute("content", "#0f172a");
        } else {
          document.documentElement.classList.remove("dark");
          document
            .querySelector('meta[name="theme-color"]')
            .setAttribute("content", "#ffffff");
        }
      })();
    </script>
    content="WeaveFlow Studio engineers robust digital solutions. We merge
    high-performance architecture with flawless design to build scalable web
    applications." />
    <meta
      name="keywords"
      content="WeaveFlow Studio, Web Development Agency, Digital Agency, Software Engineering, Scalable Web Applications, React, Next.js, Architecture"
    />

    <!-- Open Graph / Social -->
